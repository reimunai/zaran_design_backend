server.port=8081
spring.application.name=zaran_design_backend

# H2 内存数据库（开发/测试环境）
spring.datasource.url=jdbc:h2:mem:zaran;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# 允许 H2 Console 访问
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT配置
jwt.secret=zaran-design-backend-secret-key-2026-for-course-project
jwt.access-token-expiration=7200
jwt.refresh-token-expiration=604800
